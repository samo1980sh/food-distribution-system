openapi: 3.1.0
info:
  title: FreshRoute Mobile API
  version: 1.0.0
  description: Mobile API foundation for the food distribution system.
servers:
  - url: /api/v1
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '503':
          description: Service unavailable
  /auth/login:
    post:
      summary: Login and issue a device token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
        '403':
          description: Account inactive or API access denied
        '422':
          description: Validation or credentials failure
  /auth/me:
    get:
      summary: Get current user bootstrap data
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user, permissions and effective scope
        '401':
          description: Unauthenticated
        '403':
          description: Access denied
  /auth/sessions:
    get:
      summary: List current user's mobile sessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session list
  /auth/sessions/{token}:
    delete:
      summary: Revoke one mobile session
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Session revoked
        '404':
          description: Session not found for current user
  /auth/logout:
    post:
      summary: Logout current device
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current token revoked
  /auth/logout-all:
    post:
      summary: Logout all mobile devices
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All mobile tokens revoked
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
        - device_id
        - device_name
        - platform
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        device_id:
          type: string
          minLength: 8
          maxLength: 100
        device_name:
          type: string
          maxLength: 100
        platform:
          type: string
          enum: [android, ios]
        app_version:
          type: [string, 'null']
          maxLength: 30
    SuccessResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          const: true
        message:
          type: string
        data:
          type: [object, 'null']
    ErrorResponse:
      type: object
      required: [success, message, code]
      properties:
        success:
          type: boolean
          const: false
        message:
          type: string
        code:
          type: string
        errors:
          type: object
