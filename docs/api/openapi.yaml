openapi: 3.1.0
info:
  title: FreshRoute Mobile API
  version: 1.4.0
  description: >-
    Device-bound authentication, effective access scopes, scoped operational reads,
    online operational writes, cursor pull synchronization, and idempotent batch push with conflict handling for Flutter.
servers:
  - url: /api/v1
security: []
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: Service is healthy }
  /auth/login:
    post:
      summary: Login and issue a device-bound token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: Logged in }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /auth/me:
    get:
      summary: Current user, permissions, and effective scope
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Mobile bootstrap data }
        '401': { $ref: '#/components/responses/Unauthenticated' }
  /auth/sessions:
    get:
      summary: List current user's mobile sessions
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Session list }
        '401': { $ref: '#/components/responses/Unauthenticated' }
  /auth/sessions/{token}:
    delete:
      summary: Revoke one mobile session
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: token, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Session revoked }
        '404': { $ref: '#/components/responses/NotFound' }
  /auth/logout:
    post:
      summary: Logout current device
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Current token revoked }
  /auth/logout-all:
    post:
      summary: Logout all mobile devices
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: All mobile tokens revoked }

  /operational/bootstrap:
    get:
      summary: Scoped context, counters, and role-aware read/write capabilities
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Operational bootstrap loaded }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /operational/sync/status:
    get:
      summary: Get device sync state, cursor watermark, context key, and supported entities
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Sync status loaded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SyncStatusEnvelope' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /operational/sync/pull:
    post:
      summary: Pull scoped full or incremental changes using a durable cursor
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SyncPullRequest' }
      responses:
        '200':
          description: Sync changes loaded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SyncPullEnvelope' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /operational/sync/push:
    post:
      summary: Push an idempotent batch of offline operational mutations
      description: >-
        Processes operations independently in order. A stale base_version returns a per-operation
        sync_version_conflict without overwriting the server record. Receipt files are not accepted
        inside the JSON batch and must use the direct vehicle-expense REST endpoint.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SyncPushRequest' }
      responses:
        '200':
          description: Batch processed; inspect each result for applied, replayed, conflict, or failed status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SyncPushEnvelope' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /operational/routes:
    get:
      summary: List scoped distribution routes
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PerPage' }
        - { $ref: '#/components/parameters/Search' }
      responses:
        '200': { description: Paginated routes }
  /operational/vehicles:
    get:
      summary: List scoped vehicles
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: Paginated vehicles } }
  /operational/warehouses:
    get:
      summary: List scoped warehouses
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: Paginated warehouses } }
  /operational/products:
    get:
      summary: List products available to the role
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: Paginated products } }
  /operational/customers:
    get:
      summary: List scoped customers
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PerPage' }
        - { $ref: '#/components/parameters/Search' }
      responses: { '200': { description: Paginated customers } }
  /operational/stock-balances:
    get:
      summary: List scoped positive stock balances
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: Paginated stock balances } }
  /operational/vehicle-loads:
    get:
      summary: List scoped vehicle loads
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: Paginated vehicle loads } }

  /operational/sales-invoices:
    get:
      summary: List scoped sales invoices
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PerPage' }
        - { $ref: '#/components/parameters/Search' }
      responses: { '200': { description: Paginated sales invoices } }
    post:
      summary: Create an idempotent sales invoice draft
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SalesInvoiceCreate' }
      responses:
        '201': { description: Draft created }
        '200': { description: Existing draft replayed for the same client reference and payload }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /operational/sales-invoices/{salesInvoice}:
    parameters:
      - { $ref: '#/components/parameters/SalesInvoiceId' }
    get:
      summary: Show one scoped sales invoice
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Sales invoice }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update a permitted sales invoice draft
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SalesInvoiceUpdate' }
      responses:
        '200': { description: Draft updated }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      summary: Delete a permitted sales invoice draft
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Draft deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /operational/sales-invoices/{salesInvoice}/confirm:
    post:
      summary: Confirm a sales invoice and apply inventory impact
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/SalesInvoiceId' }]
      responses:
        '200': { description: Invoice confirmed }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /operational/sales-invoices/{salesInvoice}/cancel:
    post:
      summary: Cancel a confirmed sales invoice and reverse inventory impact
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/SalesInvoiceId' }]
      responses:
        '200': { description: Invoice cancelled }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /operational/customer-payments:
    get:
      summary: List scoped customer payments
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: Paginated customer payments } }
    post:
      summary: Create an idempotent customer payment draft
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerPaymentCreate' }
      responses:
        '201': { description: Draft created }
        '200': { description: Existing draft replayed }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /operational/customer-payments/{customerPayment}:
    parameters:
      - { $ref: '#/components/parameters/CustomerPaymentId' }
    get:
      summary: Show one scoped customer payment
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Customer payment }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update a permitted customer payment draft
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerPaymentUpdate' }
      responses:
        '200': { description: Draft updated }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      summary: Delete a permitted customer payment draft
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Draft deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /operational/customer-payments/{customerPayment}/confirm:
    post:
      summary: Confirm a customer payment and refresh linked invoice balance
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/CustomerPaymentId' }]
      responses:
        '200': { description: Payment confirmed }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /operational/customer-payments/{customerPayment}/cancel:
    post:
      summary: Cancel a confirmed customer payment
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/CustomerPaymentId' }]
      responses:
        '200': { description: Payment cancelled }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /operational/sales-returns:
    get:
      summary: List scoped sales returns
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: Paginated sales returns } }
    post:
      summary: Create an idempotent sales return draft
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SalesReturnCreate' }
      responses:
        '201': { description: Draft created }
        '200': { description: Existing draft replayed }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /operational/sales-returns/{salesReturn}:
    parameters:
      - { $ref: '#/components/parameters/SalesReturnId' }
    get:
      summary: Show one scoped sales return
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Sales return }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update a permitted sales return draft
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SalesReturnUpdate' }
      responses:
        '200': { description: Draft updated }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      summary: Delete a permitted sales return draft
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Draft deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /operational/sales-returns/{salesReturn}/confirm:
    post:
      summary: Confirm a sales return and restore inventory
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/SalesReturnId' }]
      responses:
        '200': { description: Return confirmed }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /operational/sales-returns/{salesReturn}/cancel:
    post:
      summary: Cancel a confirmed sales return and reverse inventory impact
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/SalesReturnId' }]
      responses:
        '200': { description: Return cancelled }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /operational/vehicle-expenses:
    get:
      summary: List scoped vehicle expenses
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: Paginated vehicle expenses } }
    post:
      summary: Create an idempotent pending vehicle expense
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VehicleExpenseCreate' }
          multipart/form-data:
            schema: { $ref: '#/components/schemas/VehicleExpenseMultipartCreate' }
      responses:
        '201': { description: Pending expense created }
        '200': { description: Existing expense replayed }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /operational/vehicle-expenses/{vehicleExpense}:
    parameters:
      - { $ref: '#/components/parameters/VehicleExpenseId' }
    get:
      summary: Show one scoped vehicle expense
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Vehicle expense }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update a permitted pending vehicle expense
      description: For file replacement with clients that cannot send multipart PATCH, use POST with `_method=PATCH`.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VehicleExpenseUpdate' }
          multipart/form-data:
            schema: { $ref: '#/components/schemas/VehicleExpenseMultipartUpdate' }
      responses:
        '200': { description: Expense updated }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      summary: Delete a permitted pending vehicle expense
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Expense deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /operational/vehicle-expenses/{vehicleExpense}/approve:
    post:
      summary: Approve a pending vehicle expense
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/VehicleExpenseId' }]
      responses:
        '200': { description: Expense approved }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /operational/vehicle-expenses/{vehicleExpense}/reject:
    post:
      summary: Reject a pending vehicle expense
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/VehicleExpenseId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VehicleExpenseReject' }
      responses:
        '200': { description: Expense rejected }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /operational/daily-closings:
    get:
      summary: List scoped daily closings
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: Paginated daily closings } }
    post:
      summary: Create an idempotent daily closing draft and calculate totals
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DailyClosingCreate' }
      responses:
        '201': { description: Draft created and totals refreshed }
        '200': { description: Existing draft replayed }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /operational/daily-closings/{dailyClosing}:
    parameters:
      - { $ref: '#/components/parameters/DailyClosingId' }
    get:
      summary: Show one scoped daily closing
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Daily closing }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update a permitted daily closing draft and refresh totals
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DailyClosingUpdate' }
      responses:
        '200': { description: Draft updated }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      summary: Delete a permitted daily closing draft
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Draft deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /operational/daily-closings/{dailyClosing}/refresh-totals:
    post:
      summary: Recalculate a daily closing draft from operational records
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/DailyClosingId' }]
      responses:
        '200': { description: Totals refreshed }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /operational/daily-closings/{dailyClosing}/confirm:
    post:
      summary: Confirm a daily closing draft
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/DailyClosingId' }]
      responses:
        '200': { description: Closing confirmed }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /operational/daily-closings/{dailyClosing}/cancel:
    post:
      summary: Cancel a confirmed daily closing
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/DailyClosingId' }]
      responses:
        '200': { description: Closing cancelled }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PerPage:
      name: per_page
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Search:
      name: search
      in: query
      schema: { type: string, maxLength: 120 }
    SalesInvoiceId:
      name: salesInvoice
      in: path
      required: true
      schema: { type: integer }
    CustomerPaymentId:
      name: customerPayment
      in: path
      required: true
      schema: { type: integer }
    SalesReturnId:
      name: salesReturn
      in: path
      required: true
      schema: { type: integer }
    VehicleExpenseId:
      name: vehicleExpense
      in: path
      required: true
      schema: { type: integer }
    DailyClosingId:
      name: dailyClosing
      in: path
      required: true
      schema: { type: integer }
  responses:
    Unauthenticated:
      description: Authentication is required
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: The role or effective data scope denies the operation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Record is missing or hidden outside the effective data scope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: Business rule or idempotency conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationErrorEnvelope' }
  schemas:
    SyncPushOperation:
      type: object
      required: [operation_id, entity, action]
      properties:
        operation_id:
          type: string
          minLength: 6
          maxLength: 100
          pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{5,99}$'
        entity:
          type: string
          enum: [sales_invoices, customer_payments, sales_returns, vehicle_expenses, daily_closings]
        action:
          type: string
          enum: [create, update, delete, confirm, cancel, approve, reject, refresh_totals]
        record_id:
          type: [integer, 'null']
          minimum: 1
          description: Required for every action except create.
        base_version:
          type: [string, 'null']
          pattern: '^c:[1-9][0-9]*$'
          description: Required for every action except create; use the opaque cursor version returned by pull or a prior push result.
        payload:
          type: object
          additionalProperties: true
          description: Entity-specific create/update data or action data such as rejection reason.
    SyncPushRequest:
      type: object
      required: [context_key, batch_id, operations]
      properties:
        context_key:
          type: string
          minLength: 64
          maxLength: 64
          pattern: '^[a-f0-9]{64}$'
        batch_id:
          type: string
          minLength: 6
          maxLength: 100
          pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{5,99}$'
        operations:
          type: array
          minItems: 1
          maxItems: 50
          items: { $ref: '#/components/schemas/SyncPushOperation' }
    SyncPushResult:
      type: object
      required: [operation_id, entity, action, status, replayed, http_status, code, message, record_id, version, record, errors]
      properties:
        operation_id: { type: string }
        entity: { type: string }
        action: { type: string }
        status: { type: string, enum: [applied, replayed, conflict, failed] }
        replayed: { type: boolean }
        replay_source: { type: [string, 'null'], enum: [operation_id, null] }
        idempotency_replayed: { type: boolean }
        http_status: { type: integer }
        code: { type: string }
        message: { type: string }
        record_id: { type: [integer, 'null'] }
        client_reference: { type: [string, 'null'] }
        version: { type: [string, 'null'], pattern: '^c:[1-9][0-9]*$' }
        record: { type: [object, 'null'], additionalProperties: true }
        errors: { type: [object, 'null'], additionalProperties: true }
    SyncPushEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data:
          type: object
          required: [batch_id, replayed, context_key, server_cursor, summary, results]
          properties:
            batch_id: { type: string }
            replayed: { type: boolean }
            context_key: { type: string, minLength: 64, maxLength: 64 }
            server_cursor: { type: integer, minimum: 0 }
            summary:
              type: object
              required: [total, applied, replayed, conflicts, failed]
              properties:
                total: { type: integer, minimum: 0 }
                applied: { type: integer, minimum: 0 }
                replayed: { type: integer, minimum: 0 }
                conflicts: { type: integer, minimum: 0 }
                failed: { type: integer, minimum: 0 }
            results:
              type: array
              items: { $ref: '#/components/schemas/SyncPushResult' }
    SyncPullRequest:
      type: object
      description: context_key is required whenever cursor is greater than zero.
      properties:
        cursor: { type: integer, minimum: 0, default: 0 }
        limit: { type: integer, minimum: 1, maximum: 500, default: 200 }
        context_key:
          type: [string, 'null']
          minLength: 64
          maxLength: 64
          pattern: '^[a-f0-9]{64}$'
    SyncChange:
      type: object
      required: [cursor, entity, operation, record_id, version, record, changed_at]
      properties:
        cursor: { type: integer, minimum: 1 }
        entity:
          type: string
          enum: [areas, routes, vehicles, warehouses, employees, product_categories, units, products, customers, stock_balances, vehicle_loads, sales_invoices, customer_payments, sales_returns, vehicle_expenses, daily_closings]
        operation: { type: string, enum: [upsert, delete] }
        record_id: { type: integer, minimum: 1 }
        version: { type: [string, 'null'], pattern: '^c:[1-9][0-9]*$' }
        record: { type: [object, 'null'], additionalProperties: true }
        changed_at: { type: string, format: date-time }
    SyncStatusEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data:
          type: object
          required: [context_key, registry_version, current_cursor, minimum_cursor, reset_required, reset_reason, device, limits, entities]
          properties:
            context_key: { type: string, minLength: 64, maxLength: 64, pattern: '^[a-f0-9]{64}$' }
            registry_version: { type: integer }
            current_cursor:
              type: integer
              minimum: 0
              description: Highest server cursor, including the compaction watermark.
            minimum_cursor:
              type: integer
              minimum: 0
              description: Minimum accepted incremental cursor; older devices must perform a full reset.
            reset_required: { type: boolean }
            reset_reason:
              type: [string, 'null']
              enum: [sync_context_changed, sync_cursor_expired, null]
            device: { type: object, additionalProperties: true }
            limits: { type: object, additionalProperties: true }
            entities:
              type: array
              items: { type: string }
    SyncPullEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data:
          type: object
          required: [context_key, cursor, server_cursor, has_more, changes, stats]
          properties:
            context_key: { type: string, minLength: 64, maxLength: 64 }
            cursor: { type: integer, minimum: 0 }
            server_cursor: { type: integer, minimum: 0 }
            has_more: { type: boolean }
            changes:
              type: array
              items: { $ref: '#/components/schemas/SyncChange' }
            stats: { type: object, additionalProperties: true }
    LoginRequest:
      type: object
      required: [email, password, device_id, device_name, platform]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
        device_id: { type: string, minLength: 8, maxLength: 100 }
        device_name: { type: string, maxLength: 100 }
        platform: { type: string, enum: [android, ios] }
        app_version: { type: [string, 'null'], maxLength: 30 }
    ErrorEnvelope:
      type: object
      required: [success, message, code]
